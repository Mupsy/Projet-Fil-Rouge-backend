
version: '3.8'

services:

  # ── Base de données PostgreSQL ────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: drone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dronedb
      POSTGRES_USER: drone_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-drone_pass}
    ports:
      - "5432:5432"
    volumes:
      # Volume nommé = données persistées même si le conteneur est supprimé
      - drone_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drone_user -d dronedb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - drone-network

  # ── Backend Spring Boot ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drone-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    networks:
      - drone-network

networks:
  drone-network:
    driver: bridge

volumes:
  # Déclaration du volume nommé — survit aux down/up et rebuild
  drone_postgres_data:
    driver: local