version: '3.8'

services:

  # ── Base de données PostgreSQL ────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: drone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dronedb
      POSTGRES_USER: drone_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-drone_pass}
    ports:
      - "5432:5432"
    volumes:
      - drone_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drone_user -d dronedb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - drone-network

  # ── Backend Spring Boot ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drone-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LOGGING_LEVEL_COM_DRONE_BACKEND_WEBSOCKET: DEBUG
    ports:
      - "8080:8080"
    volumes:
      # Logs accessibles depuis le VPS (hors conteneur)
      - /var/log/drone-backend:/var/log/drone-backend
    networks:
      - drone-network

  # ── Exporter PostgreSQL (métriques DB pour Prometheus) ────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: drone-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${SPRING_DATASOURCE_USERNAME}:${SPRING_DATASOURCE_PASSWORD}@postgres:5432/dronedb?sslmode=disable"
    depends_on:
      - postgres
    networks:
      - drone-network

  # ── cAdvisor (métriques conteneurs Docker) ────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: drone-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - drone-network

  # ── Prometheus (collecte des métriques) ───────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: drone-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - drone_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - backend
      - postgres-exporter
      - cadvisor
    networks:
      - drone-network

  # ── Grafana (dashboards visuels) ──────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: drone-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: https://monitoring.mupsy.dev
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - drone_grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - drone-network

networks:
  drone-network:
    driver: bridge

volumes:
  drone_postgres_data:
    driver: local
  drone_prometheus_data:
    driver: local
  drone_grafana_data:
    driver: local