global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend Spring Boot (Actuator + Micrometer)
  - job_name: 'spring-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Conteneurs Docker (cAdvisor)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Métriques système du VPS (Node Exporter — optionnel)
  # Décommentez si vous installez node-exporter sur le VPS
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['host.docker.internal:9100']